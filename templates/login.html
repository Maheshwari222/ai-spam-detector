
<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <style>

        body{

            font-family:Arial;

            background:linear-gradient(
                135deg,
                #667eea,
                #764ba2
            );

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;
        }

        .box{

            background:white;

            padding:40px;

            border-radius:15px;

            width:350px;

            text-align:center;
        }

        h1{

            margin-bottom:20px;
        }

        input{

            width:100%;

            padding:12px;

            margin-top:15px;

            border-radius:8px;

            border:1px solid gray;
        }

        button{

            margin-top:20px;

            padding:12px 25px;

            background:green;

            color:white;

            border:none;

            border-radius:8px;

            cursor:pointer;
        }

        a{

            display:block;

            margin-top:15px;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1>Login</h1>

        <form method="POST">

            <input
                type="text"
                name="username"
                placeholder="Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">

                Login

            </button>

        </form>

        <a href="/register">

            Create new account

        </a>

    </div>

</body>

</html>
